              - heading "Claude's Rewind" [level=3] [ref=e603]
              - paragraph [ref=e604]: "I believe this is the only thing that I actually thought was pretty amazing. So what's this magical feature? As per their docs:"
              - blockquote [ref=e605]:
                - paragraph [ref=e606]:
                  - text: Press Esc twice (Esc + Esc) or use the
                  - code [ref=e607]: "`/rewind`"
                  - text: "command to open the rewind menu. A scrollable list shows each of your prompts from the session. Select the point you want to act on, then choose an action:"
                - list [ref=e608]:
                  - listitem [ref=e609]:
                    - strong [ref=e610]: Restore code and conversation
                    - text: ": revert both code and conversation to that point"
                  - listitem [ref=e611]:
                    - strong [ref=e612]: Restore conversation
                    - text: ": rewind to that message while keeping current code"
                  - listitem [ref=e613]:
                    - strong [ref=e614]: Restore code
                    - text: ": revert file changes while keeping the conversation"
                  - listitem [ref=e615]:
                    - strong [ref=e616]: Summarize from here
                    - text: ": compress the conversation from this point forward into a summary, freeing context window space"
                  - listitem [ref=e617]:
                    - strong [ref=e618]: Never mind
                    - text: ": return to the message list without making changes"
                - paragraph [ref=e619]: After restoring the conversation or summarizing, the original prompt from the selected message is restored into the input field so you can re-send or edit it.
              - paragraph [ref=e620]: Now, does this justify one tool over the other? I honestly don't think so. But nonetheless, very very cool.
              - heading "Conclusion" [level=3] [ref=e621]
              - paragraph [ref=e622]:
                - text: "I honestly cannot say Claude is better than Copilot, or that Claude has something that would make it better than Copilot. Maybe it's my naivety and my inexperience talking here, but as I keep working with both, I haven't found a clear indicator that is able to sway me in either direction, maybe just the pricing. The more I hear from people reporting:"
                - code [ref=e623]: "`It does this better, or does that better`"
                - text: ", all I want to ask them is"
                - code [ref=e624]: "`HOW?`"
                - text: . Is it the
                - code [ref=e625]: "`Skills`"
                - text: they are using, or maybe the
                - code [ref=e626]: "`Hooks`"
                - text: "? Then this is not really a product feat, it's a customization, and in the realm of both tools, the customization at the end of the day is the same. With that said, I can only keep exploring, and I can only keep on testing until maybe I will write a part II of this article."
              - paragraph [ref=e627]: Thanks!
