            - heading "CLAUDE CODE VS. GITHUB COPILOT" [level=1] [ref=e453]
            - generic [ref=e454]:
              - 'heading "Blog Post Research: Which one is better?" [level=2] [ref=e455]'
              - blockquote [ref=e456]:
                - paragraph [ref=e457]: TL;DR. It depends on what you like and what makes you the most comfortable.
              - paragraph [ref=e458]:
                - text: "It's been 4 weeks since I transitioned from my Manager role back to an Individual Contributor, to be more specific, a Principal Software Developer. Not going to lie, the transition is an exciting challenge, and I missed the smell of burning code in the morning. Nonetheless, I am coming back after a major shift in the industry, to say the least:"
                - emphasis [ref=e459]: "\"Who is still doing Artisanal Coding?\""
                - text: .
              - paragraph [ref=e460]:
                - text: "You read it in the news:"
                - link "Spotify Developer no longer code" [ref=e461] [cursor=pointer]:
                  - /url: https://techcrunch.com/2026/02/12/spotify-says-its-best-developers-havent-written-a-line-of-code-since-december-thanks-to-ai/
                - text: ","
                - link "Claude is writing itself" [ref=e462] [cursor=pointer]:
                  - /url: https://medium.com/codex/claude-code-21-guide-16e084fd5be0
                - text: ", etc. The market has shifted from reading"
                - link "Stack Overflow" [ref=e463] [cursor=pointer]:
                  - /url: https://stackoverflow.com/questions
                - text: to simply prompting
                - link "LLMs" [ref=e464] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Large_language_model
                - text: "; the standard has become:"
                - emphasis [ref=e465]: "\"Don't burn man hours, burn tokens instead\""
                - text: ". So that's what I did: I burned tokens instead."
              - paragraph [ref=e466]:
                - text: "It started with a very simple challenge I set for myself:"
                - emphasis [ref=e467]: "\"I will not touch code anymore\""
                - text: ", and so I faced this challenge with both hands in front of me, only pushing the gas. Needless to say, what I found is nothing short of amazing. The headlines are right: AI is definitely a force multiplier, but don't get me wrong, it's a force multiplier when the proper mindset is the standard. Meaning, you can have a waffle maker, but if you don't know how long to leave them there, you're gonna end up with soggy waffles or burned waffles. Take your pick."
              - paragraph [ref=e468]:
                - text: So far, I've been finding myself learning the tool, utilizing agents, and running parallel tasks (both JIRA tickets and agents running in parallel). I've found myself really in love with how I am able to multitask a lot of my work, and how I can creatively find ways to generate files that ensure all of my development stays within the boundaries of the methodologies established by the source code architecture. This, and setting my own personal
                - link "GitHub Copilot" [ref=e469] [cursor=pointer]:
                  - /url: https://github.com/features/copilot
                - text: to have a Deadpool persona.
              - blockquote [ref=e470]:
                - paragraph [ref=e471]: ● Markdown, Captain. 🌮
              - figure "Copilot Enterprise Pricing Model" [ref=e472]:
                - generic [ref=e473]: // copilot_pricing.png
                - img "Copilot Enterprise Pricing Model" [ref=e474]
                - generic [ref=e475]: Copilot Enterprise Pricing Model
              - paragraph [ref=e476]:
                - text: After spending a glorious 3 weeks with Copilot, and burning through tokens in just a couple of days (I am sooo happy we got more premium requests enabled), my manager and a staff developer for my org came around and told me that I was included in an experiment within our organization to use
                - link "Claude Code" [ref=e477] [cursor=pointer]:
                  - /url: https://claude.ai/
                - text: . The goal? To determine what the right tool is for the business, and whether there is anything Claude offers that might justify us moving from Copilot over to Claude.
              - figure "Claude Enterprise Pricing Model" [ref=e478]:
                - generic [ref=e479]: // claude_pricing.png
                - img "Claude Enterprise Pricing Model" [ref=e480]
                - generic [ref=e481]: Claude Enterprise Pricing Model
              - paragraph [ref=e482]:
                - text: Now, I like reading
                - link "Substack" [ref=e483] [cursor=pointer]:
                  - /url: https://substack.com/
                - text: ", and the majority of the articles I read in regard to AI development are all about the wonders of Claude Code, how it works, and how it makes everything better. I am just bombarded by the media into thinking Claude Code is the real force multiplier; short to say, I was intrigued to be a part of this pilot program. As a daily user of Copilot, little did I know what I would unveil."
              - heading "What did you find?" [level=3] [ref=e484]
              - paragraph [ref=e485]:
                - text: Well, it all started on a Saturday. I was reading article after article about Claude, and I couldn't help but notice that I was reading about functionality that already exists within Copilot. The article says,
                - emphasis [ref=e486]: "\"The tooling in Claude is amazing\""
                - text: ", so I asked myself, which tooling? And this is what I found so far:"
              - list [ref=e487]:
                - listitem [ref=e488]: Claude can span multiple agents => Copilot can also run multi-agent workflows, and there is enough tooling overlap that I don't see this as a decisive gap
                - listitem [ref=e489]: Claude has an amazing Marketplace => Agreed, but Copilot also supports plugin marketplaces, including Claude-oriented ones, so this is not as exclusive as people make it sound
                - listitem [ref=e490]: Claude allows you to change the reasoning level for the models => Copilot also gives you model choice and control over how you want to work, so I don't see this as a major differentiator either
              - paragraph [ref=e491]: "The more I proceeded to dig, the more I found that they were pretty similar, and I found this to be especially true when I was working with a Jr. Software Developer (on Friday) who wanted to make a change to some caching mechanism logic we had. Let's imagine the following code:"
              - generic [ref=e492]:
                - generic [ref=e493]: // csharp
                - code [ref=e495]:
                  - text: "`public class UniversalCache {"
                  - generic [ref=e496]: public async Task Save(ClassA data)
                  - text: "{ // Hardcoded logic for ClassA await _cache.SetAsync(data); } } `"
              - paragraph [ref=e497]:
                - text: The goal is that we had an implementation for
                - code [ref=e498]: "`ClassA`"
                - text: that needed to be changed when we were invoking the caching logic from a different mechanism. In the scenario where we called the caching engine from this other place, we needed to run logic for
                - code [ref=e499]: "`ClassB`"
                - text: ", which represents another data structure we have. Right off the bat, I already knew how to proceed, but as my challenge was still up (and it will be like this forever... unless I run out of tokens), I proceeded to challenge the developer to have a conversation with their Copilot, so I told them to prompt the following:"
              - blockquote [ref=e500]:
                - paragraph [ref=e501]: I've got code in UniversalCache that stores data for ClassA, I need to refactor the code so that when I call this functionality from <parallel_function> we change the mechanism so that we work with ClassB instead. Draft a plan for the changes required.
              - paragraph [ref=e502]: "What Copilot proceeded to do was baffling. It quite literally gave me something similar to this:"
              - generic [ref=e503]:
                - generic [ref=e504]: // csharp
                - code [ref=e506]:
                  - text: "`public class UniversalCache {"
                  - generic [ref=e507]:
                    - text: public async Task Save(
                    - generic [ref=e508]: object data
                    - text: )
                  - text: "{ if (data is ClassA) { /* Logic for A */ } if (data is ClassB) { /* Logic for B */ } } } `"
              - paragraph [ref=e509]: "I was at a loss for words, so I simply proceeded to ask:"
              - blockquote [ref=e510]:
                - paragraph [ref=e511]: Why did you avoid Generics?
              - paragraph [ref=e512]: "What followed is what reminded me that AI, while very smart, at the end of the day needs a human in the loop. I hated it when I read the following message:"
              - blockquote [ref=e513]:
                - paragraph [ref=e514]: ● That's very insightful
              - paragraph [ref=e515]: "I swear, I wanted to ask Microsoft for a refund on my tokens. What it proceeded to provide looked something like the following:"
              - generic [ref=e516]:
                - generic [ref=e517]: // csharp
                - code [ref=e519]:
                  - text: "`// The Generic Orchestrator (This class remains unchanged regardless of type) public class UniversalCache<T> where T : class { private readonly ICacheRepo<T> _cacheRepo;"
                  - generic [ref=e520]: public UniversalCache(ICacheRepo<T> cacheRepo)
                  - text: "{ _cacheRepo = cacheRepo; }"
                  - generic [ref=e521]: public async Task SaveAsync(T data)
                  - text: "{ // The orchestrator stays clean; the repo handles the specific implementation await _cacheRepo.Save(data); } } // The Repository Abstraction public interface ICacheRepo<T> {"
                  - generic [ref=e522]: Task Save(T data)
                  - text: "; } // Specific Repository for ClassA public class ClassACacheRepo : ICacheRepo<ClassA>{} // Specific Repository for ClassB public class ClassBCacheRepo : ICacheRepo<ClassB>{} `"
              - paragraph [ref=e523]:
                - text: I insist. I want my tokens back. I finally had my
                - link "Bridge Pattern" [ref=e524] [cursor=pointer]:
                  - /url: https://refactoring.guru/design-patterns/bridge
                - text: and the
                - link "Strategy Pattern" [ref=e525] [cursor=pointer]:
                  - /url: https://refactoring.guru/design-patterns/strategy
                - text: ", but what did it cost me? How could we avoid this fiasco in the future? What if someone thinks:"
                - emphasis [ref=e526]: "\"Ahhh, it works, this is good!\""
              - heading "Claude to the rescue...?" [level=3] [ref=e527]
              - paragraph [ref=e528]: So, after having the conversation and providing clarification, I was back to my antics. I had a fresh installation of Claude Code, and an open mind into seeing the wonder of Claude Code. Finally, it was my time to demonstrate the everlasting power, the ultimate coding tool, no more mistakes, only greatness...
              - blockquote [ref=e529]:
                - paragraph [ref=e530]: It did exactly the same thing...
              - paragraph [ref=e531]:
                - text: What did just happen? What the hell just happened here? I thought the whole
                - code [ref=e532]: "`Thinks better`"
                - text: thing was an out-of-the-box feature, and you are probably wondering, how did you do this? Well, for both I used exactly the same models (Sonnet 4.6), and exactly the same prompts, to obtain exactly the same results and the same flow. Maybe the difference is that it called me smart?
              - blockquote [ref=e533]:
                - paragraph [ref=e534]: ● That's smart!
              - paragraph [ref=e535]:
                - text: So here I was, asking myself,
                - code [ref=e536]: "`Where did I go wrong?`"
                - text: It's gotta be a user issue, not a tool issue, to which I remembered, what is it that I read all the time in those Substack articles?
                - code [ref=e537]: "`SKILLS`"
                - text: . The secret sauce to the majority of these articles is the skills, the agents, the tooling behind the tool invocations, nothing else, nothing more. Realistically, the tool was just another Copilot, it's just that it had a different branding and a different mascot.
              - heading "So what happened Saturday?" [level=3] [ref=e538]
              - paragraph [ref=e539]: Well, I cracked the good ol' notebook, and I proceeded to do research. I also got a certification from Anthropic, because why not.
              - figure "Claude Code in Action Certificate" [ref=e540]:
                - generic [ref=e541]: // claude_code_cert.png
                - img "Claude Code in Action Certificate" [ref=e542]
                - generic [ref=e543]: Claude Code in Action Certificate
              - paragraph [ref=e544]: So, I began comparing each other, and these were the results of my research. Please feel free to ignore my handwriting.
              - paragraph [ref=e545]:
                - text: "|"
                - figure "Claude Code in Action Certificate" [ref=e546]:
